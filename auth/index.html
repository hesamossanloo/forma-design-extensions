<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APS OAuth callback</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: #0f1419;
        color: #e6edf3;
      }
      main {
        max-width: 36rem;
        padding: 1.5rem 1.75rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1rem;
        color: #8b949e;
        font-size: 0.9rem;
      }
      pre {
        margin: 0;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.35);
        font-size: 0.75rem;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .err {
        color: #ff7b72;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Autodesk OAuth callback</h1>
      <p id="status">Processing…</p>
      <pre id="log" hidden></pre>
    </main>
    <script>
      const CLIENT_ID = "KAPhOkV57EloISnrvyAZhAM2A5ZeIA6vyvGU3TkjfWjHOLHh";
      /* Trailing slash + current origin — must match Forma.auth.configure callbackUrl and APS app callbacks */
      const REDIRECT_URI = new URL("auth/", `${window.location.origin}/`).href;
      const SCOPES = ["data:read", "data:write"];

      const AUTH_URL = "https://developer.api.autodesk.com/authentication/v2/authorize";
      const TOKEN_URL = "https://developer.api.autodesk.com/authentication/v2/token";

      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");

      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.className = isError ? "err" : "";
      }

      function base64UrlEncode(bytes) {
        let binary = "";
        const u8 = new Uint8Array(bytes);
        for (let i = 0; i < u8.length; i++) binary += String.fromCharCode(u8[i]);
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }

      function randomBytes(n) {
        const a = new Uint8Array(n);
        crypto.getRandomValues(a);
        return a;
      }

      function generateCodeVerifier() {
        return base64UrlEncode(randomBytes(32));
      }

      async function generateCodeChallenge(verifier) {
        const data = new TextEncoder().encode(verifier);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return base64UrlEncode(hash);
      }

      function generateState() {
        return base64UrlEncode(randomBytes(16));
      }

      function buildAuthorizeUrl({ challenge, state }) {
        const q = new URLSearchParams({
          response_type: "code",
          client_id: CLIENT_ID,
          redirect_uri: REDIRECT_URI,
          scope: SCOPES.join(" "),
          state,
          code_challenge: challenge,
          code_challenge_method: "S256",
          prompt: "login",
        });
        return `${AUTH_URL}?${q.toString()}`;
      }

      async function exchangeCode(code, codeVerifier) {
        const body = new URLSearchParams({
          grant_type: "authorization_code",
          client_id: CLIENT_ID,
          code,
          redirect_uri: REDIRECT_URI,
          code_verifier: codeVerifier,
        });
        const res = await fetch(TOKEN_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            Accept: "application/json",
          },
          body: body.toString(),
        });
        const json = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg =
            json.error_description || json.developerMessage || json.error || res.statusText;
          throw new Error(msg || `Token request failed (${res.status})`);
        }
        return json;
      }

      function logFormaCallbackHint() {
        const msg =
          "[Forma SDK] Popup reached callback with an authorization code. " +
          "The SDK reads this URL from the popup and exchanges the code in the parent window " +
          "(it keeps the PKCE code_verifier there). " +
          "Check the parent window console for the access token (e.g. acquireTokenOverlay().then(...)).";
        console.log(msg);
        if (window.opener) {
          try {
            window.opener.console.log(msg);
          } catch (_) {
            /* cross-origin opener */
          }
        }
      }

      (async () => {
        const params = new URLSearchParams(window.location.search);
        const err = params.get("error");
        const code = params.get("code");
        const returnedState = params.get("state");

        if (err) {
          setStatus(`Authorization failed: ${err}`, true);
          const desc = params.get("error_description");
          if (desc) {
            logEl.hidden = false;
            logEl.textContent = desc;
          }
          logFormaCallbackHint();
          return;
        }

        if (!code) {
          const verifier = generateCodeVerifier();
          const challenge = await generateCodeChallenge(verifier);
          const state = generateState();
          sessionStorage.setItem("aps_pkce_verifier", verifier);
          sessionStorage.setItem("aps_pkce_state", state);
          window.location.replace(buildAuthorizeUrl({ challenge, state }));
          return;
        }

        const storedState = sessionStorage.getItem("aps_pkce_state");
        const verifier = sessionStorage.getItem("aps_pkce_verifier");

        const isStandalonePkce =
          verifier &&
          storedState &&
          returnedState &&
          storedState === returnedState;

        if (isStandalonePkce) {
          sessionStorage.removeItem("aps_pkce_state");
          sessionStorage.removeItem("aps_pkce_verifier");
          setStatus("Exchanging code for tokens…");
          try {
            const tokenResponse = await exchangeCode(code, verifier);
            const access = tokenResponse.access_token;
            console.log("APS access_token:", access);
            if (tokenResponse.refresh_token) {
              console.log("APS refresh_token:", tokenResponse.refresh_token);
            }
            console.log("Full token response:", tokenResponse);
            setStatus("Success — check the browser console for the token.", false);
            logEl.hidden = false;
            logEl.textContent = JSON.stringify(
              {
                access_token: access ? `${access.slice(0, 24)}…` : null,
                token_type: tokenResponse.token_type,
                expires_in: tokenResponse.expires_in,
                refresh_token: tokenResponse.refresh_token ? "(present)" : null,
              },
              null,
              2,
            );
            const clean = new URL(window.location.href);
            clean.search = "";
            window.history.replaceState({}, "", clean.toString());
          } catch (e) {
            const msg = e.message || String(e);
            setStatus(msg, true);
            console.error(e);
            if (/Failed to fetch|NetworkError|load failed/i.test(msg)) {
              logEl.hidden = false;
              logEl.textContent =
                "Browser token exchange was blocked (often CORS). Use a backend or proxy for " +
                TOKEN_URL;
            }
          }
          return;
        }

        /* Forma SDK popup: code in URL, verifier lives in parent — do not exchange here.
           Do not strip ?code= from the URL: the parent polls popup.location and must still see it. */
        setStatus(
          "Signed in. If this window does not close, you can close it — the app continues in the main window.",
          false,
        );
        logFormaCallbackHint();
      })();
    </script>
  </body>
</html>
